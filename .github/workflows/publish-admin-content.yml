name: VACMS Publish Admin Content

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: VACMS publish job id
        required: true
        type: string
      publish_mode:
        description: Publish mode
        required: true
        default: cms-live-branch-apply
        type: string
      request_id:
        description: VACMS Worker dispatch request id
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  pages: write

jobs:
  publish-content-pr:
    runs-on: ubuntu-latest
    env:
      ADMIN_API_BASE: https://varuntools-admin-api.ragoon703.workers.dev/api
      ADMIN_BRIDGE_TOKEN: ${{ secrets.ADMIN_BRIDGE_TOKEN }}
      JOB_ID: ${{ inputs.job_id }}
      BRIDGE_VERSION: cms-d1-017a-r2z-r1w-r1
      PUBLISH_MODE: ${{ inputs.publish_mode }}
      REQUEST_ID: ${{ inputs.request_id }}
      PAGES_DEPLOY_STRATEGY: ${{ vars.PAGES_DEPLOY_STRATEGY || 'actions' }}
      LIVE_ORIGIN: https://www.varun.tools
      LIVE_READBACK_RETRY_COUNT: ${{ vars.LIVE_READBACK_RETRY_COUNT || '18' }}
      LIVE_READBACK_RETRY_DELAY_MS: ${{ vars.LIVE_READBACK_RETRY_DELAY_MS || '10000' }}
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$JOB_ID" ]; then
            echo "job_id is required" >&2
            exit 1
          fi
          case "$JOB_ID" in
            cms204k_*)
              echo "job_id is a dispatch correlation id, not a publish job id" >&2
              exit 1
              ;;
            ghdisp_*)
              echo "job_id is a workflow dispatch request id, not a publish job id" >&2
              exit 1
              ;;
          esac
          if [ "${PUBLISH_MODE:-}" != "cms-dispatch-visibility-smoke" ] && [ -z "$ADMIN_BRIDGE_TOKEN" ]; then
            echo "ADMIN_BRIDGE_TOKEN secret is required" >&2
            exit 1
          fi
          if [ "${PUBLISH_MODE:-}" = "cms-dispatch-visibility-smoke" ] && [ -z "${REQUEST_ID:-}" ]; then
            echo "request_id is required for dry visibility smoke" >&2
            exit 1
          fi

      - name: Prepare safe publish job URL segment
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const crypto = require('node:crypto')
          const fs = require('node:fs')

          const raw = String(process.env.JOB_ID || '')
          const publishMode = String(process.env.PUBLISH_MODE || '')
          const requestId = String(process.env.REQUEST_ID || '')

          const fail = (code, detail) => {
            const digest = crypto.createHash('sha256').update(raw).digest('hex').slice(0, 16)
            console.error('CMS-204V job_id rejected: ' + code)
            console.error('job_id_length=' + raw.length)
            console.error('job_id_sha256_16=' + digest)
            console.error('publish_mode=' + publishMode)
            console.error('request_id_present=' + (requestId ? 'true' : 'false'))
            if (detail) console.error('detail=' + detail)
            process.exit(1)
          }

          if (!raw) fail('empty')
          if (raw.startsWith('cms204k_')) fail('dispatch_correlation_id_not_publish_job_id')
          if (raw.startsWith('ghdisp_')) fail('request_id_not_publish_job_id')
          if (/[\u0000-\u001f\u007f]/.test(raw)) fail('control_character')
          if (/\s/.test(raw)) fail('whitespace')
          if (/[\/\\]/.test(raw)) fail('path_separator')
          if (/["'<>?#&%]/.test(raw)) fail('url_reserved_or_quote_character')

          const allowed = /^[A-Za-z0-9._:-]+$/.test(raw)
          if (!allowed) fail('outside_allowed_job_id_charset', 'allowed=A-Za-z0-9._:-')

          const encoded = encodeURIComponent(raw)
          if (!encoded || encoded.includes('/')) fail('encoding_failed')

          fs.appendFileSync(process.env.GITHUB_ENV, 'JOB_ID_PATH_SEGMENT=' + encoded + '\n')

          const digest = crypto.createHash('sha256').update(raw).digest('hex').slice(0, 16)
          console.log('CMS-204V job_id URL path segment prepared')
          console.log('job_id_length=' + raw.length)
          console.log('job_id_sha256_16=' + digest)
          console.log('job_id_allowed_charset=true')
          console.log('job_id_encoded_length=' + encoded.length)
          console.log('publish_mode=' + publishMode)
          console.log('request_id_present=' + (requestId ? 'true' : 'false'))
          NODE

      - name: Initialize VACMS publish workflow markers
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "false" > vacms-claimed.txt
          echo "false" > vacms-success-finalized.txt
          echo "false" > vacms-failure-finalized.txt
          echo "prepared" > vacms-last-success-stage.txt
          echo "none" > vacms-failure-stage.txt

      - name: Dry visibility smoke seal
        if: ${{ inputs.publish_mode == 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "PASS_CMS_D1_017A_R2Z_R1W_R4A_F1_R1_DRY_VISIBILITY_WORKFLOW_EARLY_EXIT_GATE_SKIP_CLAIM_EXPORT_MATERIALIZE_PR_FINALIZE_ON_SMOKE_MODE_NO_VACMS_MUTATION_NO_PR"
          echo "Dry dispatch visibility smoke stopped before VACMS claim/export/materialize/PR/finalize."
          cat > dry-visibility-result.json <<JSON
          {
            "ok": true,
            "patchId": "CMS-D1-017A-R2Z-R1W-R4A-F1-R1",
            "status": "PASS_CMS_D1_017A_R2Z_R1W_R4A_F1_R1_DRY_VISIBILITY_WORKFLOW_EARLY_EXIT_GATE_SKIP_CLAIM_EXPORT_MATERIALIZE_PR_FINALIZE_ON_SMOKE_MODE_NO_VACMS_MUTATION_NO_PR",
            "publishMode": "cms-dispatch-visibility-smoke",
            "jobId": "${JOB_ID}",
            "requestId": "${REQUEST_ID}",
            "githubRunId": "${GITHUB_RUN_ID}",
            "githubRunUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "claim": false,
            "export": false,
            "materialize": false,
            "commit": false,
            "branch": false,
            "pr": false,
            "publishedFinalize": false,
            "failureFinalize": false,
            "forbiddenMutations": {
              "d1": false,
              "claim": false,
              "export": false,
              "materialize": false,
              "commit": false,
              "branch": false,
              "pr": false,
              "publishedFinalize": false
            }
          }
          JSON
          cat > vacms-dispatch-correlation.json <<JSON
          {
            "ok": true,
            "patchId": "CMS-D1-017A-R2Z-R1W-R4-LIVE-R1C-R2-RUN-CORRELATION-SEAL",
            "status": "PASS_CMS_D1_017A_R2Z_R1W_R4_LIVE_R1C_R2_RUN_CORRELATION_SEAL_WORKFLOW_ARTIFACT_WRITTEN",
            "mode": "cms-dispatch-visibility-smoke",
            "jobId": "${JOB_ID}",
            "publishMode": "${PUBLISH_MODE}",
            "requestId": "${REQUEST_ID}",
            "runId": "${GITHUB_RUN_ID}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "workflow": "${GITHUB_WORKFLOW}",
            "eventName": "${GITHUB_EVENT_NAME}",
            "repository": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "forbiddenMutations": {
              "d1": false,
              "claim": false,
              "export": false,
              "materialize": false,
              "commit": false,
              "branch": false,
              "pr": false,
              "publishedFinalize": false
            }
          }
          JSON
          echo "requestId=${REQUEST_ID}" >> "$GITHUB_STEP_SUMMARY"
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const crypto = require('node:crypto')
          const raw = String(process.env.JOB_ID || '')
          const digest = crypto.createHash('sha256').update(raw).digest('hex').slice(0, 16)
          console.log('jobIdLength=' + raw.length)
          console.log('jobIdSha25616=' + digest)
          NODE
          echo "publishMode=${PUBLISH_MODE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dry visibility smoke artifact
        if: ${{ inputs.publish_mode == 'cms-dispatch-visibility-smoke' }}
        uses: actions/upload-artifact@v4
        with:
          name: vacms-dispatch-correlation-${{ inputs.request_id }}
          path: |
            dry-visibility-result.json
            vacms-dispatch-correlation.json
          if-no-files-found: error

      - name: Checkout public repository
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claim VACMS publish job
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID_PATH_SEGMENT/claim" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"githubRunId\":\"$GITHUB_RUN_ID\",\"githubRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"bridgeVersion\":\"$BRIDGE_VERSION\"}" \
            > claim-result.json
          echo "true" > vacms-claimed.txt
          echo "claim" > vacms-last-success-stage.txt

      - name: Export VACMS publish payload
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID_PATH_SEGMENT/export" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            > export-payload.json
          echo "export" > vacms-last-success-stage.txt

      - name: Materialize content file
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')

          const payload = JSON.parse(fs.readFileSync('export-payload.json', 'utf8'))
          if (!payload || payload.ok !== true || !payload.data) {
            throw new Error('VACMS export payload is not ok')
          }

          const data = payload.data
          const generatedPath = String(data.snapshot?.generatedPath || '')
          if (!generatedPath) throw new Error('generatedPath is missing')
          if (!/^(src\/content\/pages\/|src\/content\/generated\/|public\/content\/)/.test(generatedPath)) {
            throw new Error(`generatedPath is outside allowlist: ${generatedPath}`)
          }
          if (generatedPath.includes('..') || generatedPath.startsWith('/') || generatedPath.includes('\\')) {
            throw new Error(`generatedPath is unsafe: ${generatedPath}`)
          }

          const CMS204AN_PUBLIC_ROUTE_SLUG_ALIGNMENT = 'cms-204an-public-route-slug-alignment@1'

          const normalizeRouteSlug = (value) => {
            return String(value || '')
              .trim()
              .replace(/^https?:\/\/[^/]+/i, '')
              .replace(/[?#].*$/, '')
              .replace(/^\/+|\/+$/g, '')
              .replace(/\/+/g, '/')
          }

          const contentDirFromGeneratedPath = (value) => {
            return String(value || '')
              .replace(/^src\/content\/pages\//, '')
              .replace(/\/index\.md$/, '')
              .replace(/^\/+|\/+$/g, '')
              .replace(/\/+/g, '/')
          }

          const page = data.page || {}
          const revision = data.revision || {}
          const rawFrontmatter = revision.frontmatter && typeof revision.frontmatter === 'object' && !Array.isArray(revision.frontmatter)
            ? revision.frontmatter
            : {}
          const routeSlug = normalizeRouteSlug(data.snapshot?.routePath)
          const generatedPathSlug = contentDirFromGeneratedPath(generatedPath)
          const rawFrontmatterSlug = normalizeRouteSlug(rawFrontmatter.slug)
          const vacmsSlug = normalizeRouteSlug(page.slug)
          const materializedSlug = routeSlug || generatedPathSlug || rawFrontmatterSlug || vacmsSlug || 'page'
          const slugSource = routeSlug
            ? 'routePath'
            : generatedPathSlug
              ? 'generatedPath'
              : rawFrontmatterSlug
                ? 'frontmatter.slug'
                : vacmsSlug
                  ? 'page.slug'
                  : 'fallback'

          const frontmatter = {
            ...rawFrontmatter,
            title: page.title || rawFrontmatter.title || 'Untitled',
            summary: page.summary || rawFrontmatter.summary || '',
            category: page.category || rawFrontmatter.category || 'page',
            slug: materializedSlug,
            source: 'vacms',
            vacmsSlug,
            vacmsPageId: page.id || data.job?.pageId || '',
            vacmsRevisionId: revision.id || data.job?.revisionId || '',
          }

          const bodySource = typeof revision.compiledMarkdown === 'string' && revision.compiledMarkdown.trim()
            ? { kind: 'compiledMarkdown', value: revision.compiledMarkdown }
            : { kind: 'sourceBody', value: String(revision.sourceBody || '') }

          const CMS204AJ_YAML_ARRAY_PRESERVATION = 'cms-204aj-yaml-array-preservation@1'
          
          const CMS204AK_OBJECT_SERIALIZATION_GUARD = 'cms-204ak-object-serialization-guard@1'

          const normalizeStringArray = (value) => {
            if (Array.isArray(value)) {
              return value
                .filter((item) => typeof item === 'string')
                .map((item) => item.trim())
                .filter(Boolean)
            }

            if (typeof value === 'string') {
              return value
                .split(',')
                .map((item) => item.trim())
                .filter(Boolean)
            }

            return []
          }

          frontmatter.tags = normalizeStringArray(frontmatter.tags)

          const yamlScalar = (value) => {
            if (value === null || value === undefined) return '""'
            if (typeof value === 'object') return JSON.stringify(JSON.stringify(value))
            return JSON.stringify(String(value))
          }
          const yamlEntry = ([key, value]) => {
            if (Array.isArray(value)) {
              if (value.length === 0) return key + ': []'
              return key + ':\n' + value.map((item) => '  - ' + yamlScalar(item)).join('\n')
            }

            return key + ': ' + yamlScalar(value)
          }
          const yaml = Object.entries(frontmatter)
            .map(yamlEntry)
            .join('\n')
          const content = `---\n${yaml}\n---\n\n${bodySource.value.replace(/^---[\s\S]*?---\s*/, '')}`
          fs.mkdirSync(require('node:path').dirname(generatedPath), { recursive: true })
          fs.writeFileSync(generatedPath, content, 'utf8')

          const contentHash = crypto.createHash('sha256').update(content).digest('hex')
          const receipt = {
            jobId: data.job?.id || process.env.JOB_ID,
            pageId: page.id || null,
            revisionId: revision.id || null,
            generatedPath,
            routePath: data.snapshot?.routePath || null,
            materializedSlug,
            vacmsSlug,
            generatedPathSlug,
            slugSource,
            source: bodySource.kind,
            contentHash,
          }
          fs.writeFileSync('vacms-materialization-receipt.json', JSON.stringify(receipt, null, 2))
          fs.writeFileSync('vacms-generated-path.txt', generatedPath)
          NODE
          echo "materialize" > vacms-last-success-stage.txt

      - name: Commit materialized source back to main
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/commit-vacms-materialized-source.mjs --workflow
          echo "source_commit" > vacms-last-success-stage.txt

      - name: Verify main source commit readback
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207i-main-source-readback-smoke.mjs --workflow
          echo "main_source_readback" > vacms-last-success-stage.txt

      - name: Build VACMS live markdown registry source
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-vacms-live-markdown-registry.mjs --workflow
          echo "registry_source_rebind" > vacms-last-success-stage.txt

      - name: Setup Node for live branch apply
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install public site dependencies for live branch apply
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: npm ci

      - name: Validate and build live branch apply content
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          echo "build" > vacms-last-success-stage.txt

      - name: Materialize static route HTML
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/materialize-static-routes.mjs --workflow
          echo "static_route_materialization" > vacms-last-success-stage.txt

      - name: Prerender homepage recent public content feed
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/prerender-homepage-recent-feed.mjs --workflow
          echo "homepage_recent_feed_prerender" > vacms-last-success-stage.txt

      - name: Build runtime public content index
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-public-content-index.mjs --workflow
          npm run smoke:cms207h
          echo "runtime_public_content_index" > vacms-last-success-stage.txt
      - name: Verify static route HTML materialization
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207c-static-route-materialization-guard.mjs --workflow
          echo "static_route_guard" > vacms-last-success-stage.txt

      - name: Verify no empty app shell static article
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207d-no-empty-app-shell-smoke.mjs --workflow
          echo "static_article_shell_guard" > vacms-last-success-stage.txt

      - name: Verify homepage static recent feed
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207g-homepage-static-recent-feed-smoke.mjs --workflow
          node scripts/cms207g-no-spa-only-home-feed-smoke.mjs --workflow
          echo "homepage_recent_feed_guard" > vacms-last-success-stage.txt

      - name: Build runtime public content index
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-public-content-index.mjs --workflow
          echo "public_content_index_build" > vacms-last-success-stage.txt

      - name: Verify runtime public content index
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          npm run smoke:cms207h
          echo "public_content_index_smoke" > vacms-last-success-stage.txt

      - name: Verify GitHub Pages deployment mode
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207l-pages-deploy-mode-smoke.mjs --workflow
          echo "pages_deploy_mode" > vacms-last-success-stage.txt

      - name: Verify dist artifact before Pages deploy
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207l-dist-artifact-readback-smoke.mjs --workflow
          echo "dist_artifact_readback" > vacms-last-success-stage.txt

      - name: Verify live materialized markdown page registry
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms-204ao-markdown-page-registry-inclusion-guard.mjs --workflow
          echo "registry" > vacms-last-success-stage.txt

      - name: Configure Git author for live branch deploy
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy live public site branch
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        run: |
          set -euo pipefail
          npm run release:pages -- --push --skip-prepare
          echo "deploy_branch" > vacms-last-success-stage.txt

      - name: Configure GitHub Pages
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'actions' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'actions' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages artifact
        id: deployment
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'actions' }}
        uses: actions/deploy-pages@v4

      - name: Seal GitHub Pages Actions deploy receipt
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'actions' }}
        shell: bash
        env:
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          node scripts/cms207l-pages-actions-deploy-receipt.mjs --workflow
          echo "deploy_actions" > vacms-last-success-stage.txt

      - name: Verify gh-pages static route readback
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207c-gh-pages-static-route-readback-smoke.mjs --workflow
          echo "static_route_readback" > vacms-last-success-stage.txt

      - name: Verify gh-pages static article readback
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207d-gh-pages-static-article-readback-smoke.mjs --workflow
          echo "static_article_readback" > vacms-last-success-stage.txt

      - name: Verify gh-pages homepage recent feed readback
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207g-home-surface-readback-smoke.mjs --workflow
          echo "homepage_recent_feed_readback" > vacms-last-success-stage.txt

      - name: Verify publish button gh-pages route and public index readback
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207i-gh-pages-route-and-index-readback-smoke.mjs --workflow
          echo "publish_button_gh_pages_readback" > vacms-last-success-stage.txt

      - name: Verify gh-pages runtime public content index readback
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207h-public-content-index-readback-smoke.mjs --workflow
          echo "public_content_index_readback" > vacms-last-success-stage.txt

      - name: Verify live published Pages artifact
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        env:
          LIVE_ORIGIN: ${{ env.LIVE_ORIGIN }}
          LIVE_READBACK_RETRY_COUNT: ${{ env.LIVE_READBACK_RETRY_COUNT }}
          LIVE_READBACK_RETRY_DELAY_MS: ${{ env.LIVE_READBACK_RETRY_DELAY_MS }}
        run: |
          set -euo pipefail
          node scripts/cms207l-live-published-artifact-smoke.mjs --workflow
          echo "live_published_artifact_readback" > vacms-last-success-stage.txt

      - name: Verify live GitHub Pages domain readback
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        env:
          LIVE_ORIGIN: https://www.varun.tools
          LIVE_READBACK_RETRY_COUNT: 12
          LIVE_READBACK_RETRY_DELAY_MS: 10000
        run: |
          set -euo pipefail
          node scripts/cms207k-live-pages-readback-smoke.mjs --workflow
          echo "live_pages_readback" > vacms-last-success-stage.txt

      - name: Verify publish button remote commit deploy closure
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' && env.PAGES_DEPLOY_STRATEGY == 'branch' }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/cms207i-publish-button-closure-smoke.mjs --workflow
          echo "publish_button_remote_closure" > vacms-last-success-stage.txt

      - name: Finalize live public site deploy
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')
          const childProcess = require('node:child_process')

          const exportPayload = JSON.parse(fs.readFileSync('export-payload.json', 'utf8'))
          const data = exportPayload.data || {}
          const generatedPath = String(data.snapshot?.generatedPath || fs.readFileSync('vacms-generated-path.txt', 'utf8')).trim()
          if (!generatedPath) throw new Error('generatedPath is missing for live deploy finalize')

          const content = fs.readFileSync(generatedPath)
          const contentHash = crypto.createHash('sha256').update(content).digest('hex')
          const pagesDeployStrategy = String(process.env.PAGES_DEPLOY_STRATEGY || 'actions')
          const pagesDeployModeReceiptPath = 'vacms-pages-deploy-mode-receipt.json'
          const distArtifactReadbackReceiptPath = 'vacms-dist-artifact-readback-receipt.json'
          const livePublishedArtifactReceiptPath = 'vacms-live-published-artifact-receipt.json'
          for (const requiredReceipt of [pagesDeployModeReceiptPath, distArtifactReadbackReceiptPath, livePublishedArtifactReceiptPath]) {
            if (!fs.existsSync(requiredReceipt)) {
              throw new Error('CMS-207L required Pages receipt is missing: ' + requiredReceipt)
            }
          }
          const pagesDeployModeReceipt = JSON.parse(fs.readFileSync(pagesDeployModeReceiptPath, 'utf8'))
          const distArtifactReadbackReceipt = JSON.parse(fs.readFileSync(distArtifactReadbackReceiptPath, 'utf8'))
          const livePublishedArtifactReceipt = JSON.parse(fs.readFileSync(livePublishedArtifactReceiptPath, 'utf8'))
          if (!pagesDeployModeReceipt.ok || pagesDeployModeReceipt.strategy !== pagesDeployStrategy) {
            throw new Error('CMS-207L pages deploy mode receipt is not sealed')
          }
          if (!distArtifactReadbackReceipt.ok) {
            throw new Error('CMS-207L dist artifact readback receipt is not sealed')
          }
          if (
            !livePublishedArtifactReceipt.ok ||
            livePublishedArtifactReceipt.finalizeAllowed !== true ||
            livePublishedArtifactReceipt.live?.publicIndexJsonOk !== true ||
            livePublishedArtifactReceipt.live?.routeHtmlOk !== true ||
            livePublishedArtifactReceipt.live?.latestAssetOk !== true
          ) {
            throw new Error('CMS-207L live published artifact receipt is not sealed')
          }
          let deployEvidencePath = 'vacms-pages-deploy-evidence.json'
          let deployEvidence = { pushed: true, verifiedDistReuse: true }
          if (pagesDeployStrategy === 'branch') {
            deployEvidencePath = 'vacms-pages-deploy-evidence.json'
            deployEvidence = JSON.parse(fs.readFileSync(deployEvidencePath, 'utf8'))
            const publishButtonClosureReceiptPath = 'vacms-publish-button-closure-receipt.json'
            if (!fs.existsSync(publishButtonClosureReceiptPath)) {
              throw new Error('CMS-207I publish button closure receipt is missing')
            }
            const publishButtonClosureReceipt = JSON.parse(fs.readFileSync(publishButtonClosureReceiptPath, 'utf8'))
            if (
              !publishButtonClosureReceipt ||
              publishButtonClosureReceipt.ok !== true ||
              publishButtonClosureReceipt.localPushRequired !== false ||
              publishButtonClosureReceipt.mainReadbackVerified !== true ||
              publishButtonClosureReceipt.ghPagesRouteReadbackVerified !== true ||
              publishButtonClosureReceipt.publicContentIndexReadbackVerified !== true
            ) {
              throw new Error('CMS-207I publish button closure receipt is not sealed')
            }
          } else if (pagesDeployStrategy === 'actions') {
            deployEvidencePath = 'vacms-pages-actions-deploy-receipt.json'
            const pagesActionsDeployReceipt = JSON.parse(fs.readFileSync(deployEvidencePath, 'utf8'))
            if (!pagesActionsDeployReceipt.ok || pagesActionsDeployReceipt.strategy !== 'actions') {
              throw new Error('CMS-207L Pages Actions deploy receipt is not sealed')
            }
            deployEvidence = { pushed: true, verifiedDistReuse: true, pagesUrl: pagesActionsDeployReceipt.pagesUrl, deploymentId: pagesActionsDeployReceipt.deploymentId }
          } else {
            throw new Error('CMS-207L pages deployment strategy is invalid: ' + pagesDeployStrategy)
          }

          let livePagesReadbackReceiptPath = ''
          let livePagesReadbackReceipt = null

          if (pagesDeployStrategy === 'branch') {
            livePagesReadbackReceiptPath = 'vacms-live-pages-readback-receipt.json'
            if (!fs.existsSync(livePagesReadbackReceiptPath)) {
              throw new Error('CMS-207K live pages readback receipt is missing')
            }
            livePagesReadbackReceipt = JSON.parse(fs.readFileSync(livePagesReadbackReceiptPath, 'utf8'))
            if (
              !livePagesReadbackReceipt ||
              livePagesReadbackReceipt.ok !== true ||
              livePagesReadbackReceipt.status !== 'PASS_CMS_207K_LIVE_PAGES_READBACK' ||
              livePagesReadbackReceipt.finalizeAllowed !== true ||
              livePagesReadbackReceipt.branchOnlySuccessBlocked !== true ||
              !livePagesReadbackReceipt.live ||
              livePagesReadbackReceipt.live.publicIndexJsonOk !== true ||
              livePagesReadbackReceipt.live.routeHtmlOk !== true ||
              livePagesReadbackReceipt.live.latestAssetOk !== true
            ) {
              throw new Error('CMS-207K live pages readback receipt is not sealed')
            }
          } else {
            livePagesReadbackReceiptPath = livePublishedArtifactReceiptPath
            livePagesReadbackReceipt = {
              ok: true,
              status: 'PASS_CMS_207L_LIVE_PUBLISHED_ARTIFACT_READBACK',
              finalizeAllowed: true,
              branchOnlySuccessBlocked: true,
              liveOrigin: livePublishedArtifactReceipt.liveOrigin || process.env.LIVE_ORIGIN || 'https://www.varun.tools',
              live: {
                publicIndexJsonOk: livePublishedArtifactReceipt.live?.publicIndexJsonOk === true,
                routeHtmlOk: livePublishedArtifactReceipt.live?.routeHtmlOk === true,
                latestAssetOk: livePublishedArtifactReceipt.live?.latestAssetOk === true
              }
            }
          }

          const sourceCommitReceiptPath = 'vacms-source-commit-receipt.json'
          if (!fs.existsSync(sourceCommitReceiptPath)) {
            throw new Error('CMS-204AS source commit receipt is missing')
          }
          const sourceCommitReceipt = JSON.parse(fs.readFileSync(sourceCommitReceiptPath, 'utf8'))
          if (!sourceCommitReceipt || sourceCommitReceipt.ok !== true || !sourceCommitReceipt.sourceCommitSha) {
            throw new Error('CMS-204AS source commit receipt is not ok or sourceCommitSha is missing')
          }
          if (!deployEvidence || deployEvidence.pushed !== true) {
            throw new Error('CMS-204AL live deploy push evidence is missing or pushed is not true')
          }
          let deploySha = ''
          if (pagesDeployStrategy === 'branch') {
            try {
              deploySha = childProcess.execFileSync('git', ['ls-remote', 'origin', 'refs/heads/gh-pages'], { encoding: 'utf8' }).trim().split(/\s+/)[0] || ''
            } catch (error) {
              throw new Error('CMS-204AL gh-pages deploy SHA readback failed: ' + (error instanceof Error ? error.message : String(error)))
            }
            if (!deploySha) {
              throw new Error('CMS-204AL gh-pages deploy SHA readback failed')
            }
          } else {
            deploySha = String(deployEvidence.deploymentId || process.env.GITHUB_RUN_ID || '')
          }
          if (deployEvidence.verifiedDistReuse !== true) {
            throw new Error('CMS-204AR verified dist reuse evidence is missing or false')
          }

          const githubRunUrl = process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID
          const receipt = {
            ok: true,
            patchId: 'CMS-204T',
            status: 'PASS_CMS_204T_PUBLIC_SITE_PUBLISH_PIPELINE_REBIND_MATERIALIZE_CONTENT_TO_LIVE_DEPLOY_BRIDGE_SEAL',
            jobId: data.job?.id || process.env.JOB_ID,
            pageId: data.page?.id || null,
            revisionId: data.revision?.id || null,
            generatedPath,
            routePath: data.snapshot?.routePath || null,
            publishMode: 'cms-live-branch-apply',
            deployTarget: 'gh-pages',
            pagesDeployStrategy: process.env.PAGES_DEPLOY_STRATEGY || 'actions',
            liveOrigin: process.env.LIVE_ORIGIN || 'https://www.varun.tools',
            livePublishedArtifactReceipt: 'vacms-live-published-artifact-receipt.json',
            distArtifactReadbackReceipt: 'vacms-dist-artifact-readback-receipt.json',
            branchOnlySuccessBlocked: true,
            liveReadbackRequired: true,
            contentHash,
            deploySha,
            deployPushed: deployEvidence.pushed === true,
            deployEvidence: deployEvidencePath,
            livePagesReadbackReceipt: livePagesReadbackReceiptPath,
            livePagesReadbackVerified: livePagesReadbackReceipt.finalizeAllowed === true,
            liveOrigin: livePagesReadbackReceipt.liveOrigin || 'https://www.varun.tools',
            liveReadbackStatus: livePagesReadbackReceipt.status,
            branchOnlySuccessBlocked: livePagesReadbackReceipt.branchOnlySuccessBlocked === true,
            sourceCommitReceipt: sourceCommitReceiptPath,
            sourceCommitted: sourceCommitReceipt.sourceCommitted === true,
            sourceCommitSha: sourceCommitReceipt.sourceCommitSha,
            sourceBranch: sourceCommitReceipt.sourceBranch || 'main',
            verifiedDistReuse: deployEvidence.verifiedDistReuse === true,
            githubRunUrl,
            generatedAt: new Date().toISOString()
          }
          fs.writeFileSync('vacms-live-deploy-receipt.json', JSON.stringify(receipt, null, 2))

          const finalize = {
            result: 'bridge_live_deployed',
            message: 'Public site content materialized, validated, and deployed to gh-pages.',
            githubRunUrl,
            commitSha: deploySha,
            snapshotWriterVersion: data.snapshot?.snapshotWriterVersion || 'cms-snapshot-writer-v1',
            generatedPath,
            generatedFiles: [{
              path: generatedPath,
              action: 'update',
              kind: 'page_markdown',
              reason: 'cms-live-branch-apply materialized content',
              previousHash: null,
              nextHash: contentHash
            }],
            publishMode: 'cms-live-branch-apply',
            deployTarget: 'gh-pages',
            pagesDeployStrategy: process.env.PAGES_DEPLOY_STRATEGY || 'actions',
            liveOrigin: process.env.LIVE_ORIGIN || 'https://www.varun.tools',
            livePublishedArtifactReceipt: 'vacms-live-published-artifact-receipt.json',
            distArtifactReadbackReceipt: 'vacms-dist-artifact-readback-receipt.json',
            branchOnlySuccessBlocked: true,
            liveReadbackRequired: true,
            deployPushed: deployEvidence.pushed === true,
            deployEvidence: deployEvidencePath,
            contentHash,
            liveDeployReceipt: 'vacms-live-deploy-receipt.json',
            livePagesReadbackReceipt: livePagesReadbackReceiptPath,
            liveOrigin: livePagesReadbackReceipt.liveOrigin || 'https://www.varun.tools',
            liveHostReadback: true,
            branchOnlySuccessBlocked: livePagesReadbackReceipt.branchOnlySuccessBlocked === true
          }
          fs.writeFileSync('vacms-live-finalize.json', JSON.stringify(finalize, null, 2))
          NODE
          curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID_PATH_SEGMENT/finalize" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data @vacms-live-finalize.json \
            > finalize-result.json
          echo "true" > vacms-success-finalized.txt
          echo "success_finalize" > vacms-last-success-stage.txt
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs')
          const receipt = JSON.parse(fs.readFileSync('vacms-live-deploy-receipt.json', 'utf8'))
          console.log('publishMode=' + receipt.publishMode)
          console.log('jobId=' + receipt.jobId)
          console.log('generatedPath=' + receipt.generatedPath)
          console.log('finalizeResult=bridge_live_deployed')
          console.log('deployTarget=' + receipt.deployTarget)
          console.log('deployPushed=' + String(receipt.deployPushed))
          console.log('deploySha=' + receipt.deploySha)
          console.log('sourceCommitSha=' + receipt.sourceCommitSha)
          console.log('sourceCommitted=' + String(receipt.sourceCommitted))
          console.log('liveDeployReceipt=vacms-live-deploy-receipt.json')
          console.log('livePagesReadbackReceipt=' + receipt.livePagesReadbackReceipt)
          console.log('liveHostReadback=' + String(receipt.livePagesReadbackVerified))
          console.log('liveOrigin=' + receipt.liveOrigin)
          NODE

      - name: Create branch and draft pull request
        if: ${{ inputs.publish_mode == 'cms-github-pages-pr-candidate' || inputs.publish_mode == 'cms-09-snapshot-apply' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GENERATED_PATH="$(cat vacms-generated-path.txt)"
          BRANCH_NAME="vacms/publish/$JOB_ID"
          git config user.name "vacms-publish-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add "$GENERATED_PATH" vacms-materialization-receipt.json
          if git diff --cached --quiet; then
            echo "No public content changes detected."
            curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID_PATH_SEGMENT/finalize" \
              -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"result\":\"bridge_verified\",\"message\":\"No public content changes detected.\",\"githubRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
              > finalize-result.json
            echo "true" > vacms-success-finalized.txt
            echo "pr_candidate_no_change_finalize" > vacms-last-success-stage.txt
            exit 0
          fi
          git commit -m "VACMS publish $JOB_ID"
          git push origin HEAD:"$BRANCH_NAME"
          cat > pr-body.md <<PRBODY
          ## VACMS Publish Candidate

          - Job ID: \`$JOB_ID\`
          - Generated path: \`$GENERATED_PATH\`
          - Branch: \`$BRANCH_NAME\`

          ## Policy

          - Direct main push: disabled
          - Automatic merge: disabled
          - Review required: yes
          PRBODY
          PR_URL="$(gh pr create --draft --base main --head "$BRANCH_NAME" --title "[VACMS] Publish $JOB_ID" --body-file pr-body.md)"
          echo "$PR_URL" > vacms-pr-url.txt
          curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID_PATH_SEGMENT/finalize" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"result\":\"bridge_verified\",\"message\":\"Draft PR created: $PR_URL\",\"githubRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            > finalize-result.json
          echo "true" > vacms-success-finalized.txt
          echo "pr_candidate_finalize" > vacms-last-success-stage.txt

      - name: Finalize VACMS publish failure
        if: ${{ failure() && inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -uo pipefail
          CLAIMED="$(cat vacms-claimed.txt 2>/dev/null || echo false)"
          SUCCESS_FINALIZED="$(cat vacms-success-finalized.txt 2>/dev/null || echo false)"
          LAST_STAGE="$(cat vacms-last-success-stage.txt 2>/dev/null || echo none)"
          echo "$LAST_STAGE" > vacms-failure-stage.txt
          if [ "$CLAIMED" != "true" ]; then
            node <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')
          const raw = String(process.env.JOB_ID || '')
          const digest = crypto.createHash('sha256').update(raw).digest('hex').slice(0, 16)
          const receipt = {
            ok: false,
            patchId: 'CMS-204W',
            status: 'FAIL_CMS_204W_PUBLISH_ADMIN_WORKFLOW_FAILURE_FINALIZE_RUNTIME_FAILURE_RECEIPT_UNCLAIMED',
            jobIdHash16: digest,
            publishMode: String(process.env.PUBLISH_MODE || ''),
            requestIdPresent: Boolean(process.env.REQUEST_ID),
            claimed: false,
            successFinalized: false,
            failureFinalized: false,
            failureStage: fs.existsSync('vacms-failure-stage.txt') ? fs.readFileSync('vacms-failure-stage.txt', 'utf8').trim() : 'none',
            githubRunUrl: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID,
            generatedAt: new Date().toISOString()
          }
          fs.writeFileSync('vacms-failure-receipt.json', JSON.stringify(receipt, null, 2))
          NODE
            exit 0
          fi
          if [ "$SUCCESS_FINALIZED" = "true" ]; then
            exit 0
          fi
          node <<'NODE'
          const fs = require('node:fs')
          const rawStage = fs.existsSync('vacms-failure-stage.txt') ? fs.readFileSync('vacms-failure-stage.txt', 'utf8').trim() : 'none'
          const githubRunUrl = process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID
          const failureFinalize = {
            result: 'bridge_failed',
            message: 'VACMS publish workflow failed after claim.',
            githubRunUrl,
            publishMode: String(process.env.PUBLISH_MODE || ''),
            failureStage: rawStage,
            requestIdPresent: Boolean(process.env.REQUEST_ID)
          }
          fs.writeFileSync('vacms-failure-finalize.json', JSON.stringify(failureFinalize, null, 2))
          NODE
          if curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID_PATH_SEGMENT/finalize" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data @vacms-failure-finalize.json \
            > failure-finalize-result.json; then
            echo "true" > vacms-failure-finalized.txt
          else
            echo "false" > vacms-failure-finalized.txt
          fi
          node <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')
          const raw = String(process.env.JOB_ID || '')
          const digest = crypto.createHash('sha256').update(raw).digest('hex').slice(0, 16)
          const failureFinalized = fs.existsSync('vacms-failure-finalized.txt') && fs.readFileSync('vacms-failure-finalized.txt', 'utf8').trim() === 'true'
          const receipt = {
            ok: false,
            patchId: 'CMS-204W',
            status: 'FAIL_CMS_204W_PUBLISH_ADMIN_WORKFLOW_FAILURE_FINALIZE_RUNTIME_FAILURE_RECEIPT',
            jobIdHash16: digest,
            publishMode: String(process.env.PUBLISH_MODE || ''),
            requestIdPresent: Boolean(process.env.REQUEST_ID),
            claimed: true,
            successFinalized: false,
            failureFinalized,
            failureStage: fs.existsSync('vacms-failure-stage.txt') ? fs.readFileSync('vacms-failure-stage.txt', 'utf8').trim() : 'none',
            githubRunUrl: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID,
            generatedAt: new Date().toISOString()
          }
          fs.writeFileSync('vacms-failure-receipt.json', JSON.stringify(receipt, null, 2))
          NODE

      - name: Upload VACMS publish receipts
        uses: actions/upload-artifact@v4
        if: ${{ always() && inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        with:
          name: vacms-publish-${{ inputs.job_id }}
          path: |
            claim-result.json
            export-payload.json
            vacms-materialization-receipt.json
            vacms-source-commit-receipt.json
            vacms-pages-deploy-evidence.json
            vacms-live-markdown-registry-source-rebind.json
            vacms-page-registry-receipt.json
            vacms-live-deploy-receipt.json
            vacms-live-finalize.json
            vacms-pr-url.txt
            finalize-result.json
            vacms-failure-receipt.json
            vacms-failure-finalize.json
            failure-finalize-result.json
            vacms-last-success-stage.txt
            vacms-claimed.txt
            vacms-success-finalized.txt
            vacms-failure-finalized.txt
            vacms-failure-stage.txt
          if-no-files-found: ignore




