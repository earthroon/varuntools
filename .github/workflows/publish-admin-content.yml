name: VACMS Publish Admin Content

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: VACMS publish job id
        required: true
        type: string
      publish_mode:
        description: Publish mode
        required: true
        default: cms-live-branch-apply
        type: string
      request_id:
        description: VACMS Worker dispatch request id
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-content-pr:
    runs-on: ubuntu-latest
    env:
      ADMIN_API_BASE: https://varuntools-admin-api.ragoon703.workers.dev/api
      ADMIN_BRIDGE_TOKEN: ${{ secrets.ADMIN_BRIDGE_TOKEN }}
      JOB_ID: ${{ inputs.job_id }}
      BRIDGE_VERSION: cms-d1-017a-r2z-r1w-r1
      PUBLISH_MODE: ${{ inputs.publish_mode }}
      REQUEST_ID: ${{ inputs.request_id }}
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$JOB_ID" ]; then
            echo "job_id is required" >&2
            exit 1
          fi
          case "$JOB_ID" in
            cms204k_*)
              echo "job_id is a dispatch correlation id, not a publish job id" >&2
              exit 1
              ;;
          esac
          if [ "${PUBLISH_MODE:-}" != "cms-dispatch-visibility-smoke" ] && [ -z "$ADMIN_BRIDGE_TOKEN" ]; then
            echo "ADMIN_BRIDGE_TOKEN secret is required" >&2
            exit 1
          fi
          if [ "${PUBLISH_MODE:-}" = "cms-dispatch-visibility-smoke" ] && [ -z "${REQUEST_ID:-}" ]; then
            echo "request_id is required for dry visibility smoke" >&2
            exit 1
          fi

      - name: Dry visibility smoke seal
        if: ${{ inputs.publish_mode == 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "PASS_CMS_D1_017A_R2Z_R1W_R4A_F1_R1_DRY_VISIBILITY_WORKFLOW_EARLY_EXIT_GATE_SKIP_CLAIM_EXPORT_MATERIALIZE_PR_FINALIZE_ON_SMOKE_MODE_NO_VACMS_MUTATION_NO_PR"
          echo "Dry dispatch visibility smoke stopped before VACMS claim/export/materialize/PR/finalize."
          cat > dry-visibility-result.json <<JSON
          {
            "ok": true,
            "patchId": "CMS-D1-017A-R2Z-R1W-R4A-F1-R1",
            "status": "PASS_CMS_D1_017A_R2Z_R1W_R4A_F1_R1_DRY_VISIBILITY_WORKFLOW_EARLY_EXIT_GATE_SKIP_CLAIM_EXPORT_MATERIALIZE_PR_FINALIZE_ON_SMOKE_MODE_NO_VACMS_MUTATION_NO_PR",
            "publishMode": "cms-dispatch-visibility-smoke",
            "jobId": "${JOB_ID}",
            "requestId": "${REQUEST_ID}",
            "githubRunId": "${GITHUB_RUN_ID}",
            "githubRunUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "claim": false,
            "export": false,
            "materialize": false,
            "commit": false,
            "branch": false,
            "pr": false,
            "publishedFinalize": false,
            "failureFinalize": false,
            "forbiddenMutations": {
              "d1": false,
              "claim": false,
              "export": false,
              "materialize": false,
              "commit": false,
              "branch": false,
              "pr": false,
              "publishedFinalize": false
            }
          }
          JSON
          cat > vacms-dispatch-correlation.json <<JSON
          {
            "ok": true,
            "patchId": "CMS-D1-017A-R2Z-R1W-R4-LIVE-R1C-R2-RUN-CORRELATION-SEAL",
            "status": "PASS_CMS_D1_017A_R2Z_R1W_R4_LIVE_R1C_R2_RUN_CORRELATION_SEAL_WORKFLOW_ARTIFACT_WRITTEN",
            "mode": "cms-dispatch-visibility-smoke",
            "jobId": "${JOB_ID}",
            "publishMode": "${PUBLISH_MODE}",
            "requestId": "${REQUEST_ID}",
            "runId": "${GITHUB_RUN_ID}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "workflow": "${GITHUB_WORKFLOW}",
            "eventName": "${GITHUB_EVENT_NAME}",
            "repository": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "forbiddenMutations": {
              "d1": false,
              "claim": false,
              "export": false,
              "materialize": false,
              "commit": false,
              "branch": false,
              "pr": false,
              "publishedFinalize": false
            }
          }
          JSON
          echo "requestId=${REQUEST_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "jobId=${JOB_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "publishMode=${PUBLISH_MODE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dry visibility smoke artifact
        if: ${{ inputs.publish_mode == 'cms-dispatch-visibility-smoke' }}
        uses: actions/upload-artifact@v4
        with:
          name: vacms-dispatch-correlation-${{ inputs.request_id }}
          path: |
            dry-visibility-result.json
            vacms-dispatch-correlation.json
          if-no-files-found: error

      - name: Checkout public repository
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claim VACMS publish job
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID/claim" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"githubRunId\":\"$GITHUB_RUN_ID\",\"githubRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"bridgeVersion\":\"$BRIDGE_VERSION\"}" \
            > claim-result.json

      - name: Export VACMS publish payload
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID/export" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            > export-payload.json

      - name: Materialize content file
        if: ${{ inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')

          const payload = JSON.parse(fs.readFileSync('export-payload.json', 'utf8'))
          if (!payload || payload.ok !== true || !payload.data) {
            throw new Error('VACMS export payload is not ok')
          }

          const data = payload.data
          const generatedPath = String(data.snapshot?.generatedPath || '')
          if (!generatedPath) throw new Error('generatedPath is missing')
          if (!/^(src\/content\/pages\/|src\/content\/generated\/|public\/content\/)/.test(generatedPath)) {
            throw new Error(`generatedPath is outside allowlist: ${generatedPath}`)
          }
          if (generatedPath.includes('..') || generatedPath.startsWith('/') || generatedPath.includes('\\')) {
            throw new Error(`generatedPath is unsafe: ${generatedPath}`)
          }

          const page = data.page || {}
          const revision = data.revision || {}
          const rawFrontmatter = revision.frontmatter && typeof revision.frontmatter === 'object' && !Array.isArray(revision.frontmatter)
            ? revision.frontmatter
            : {}
          const frontmatter = {
            ...rawFrontmatter,
            title: page.title || rawFrontmatter.title || 'Untitled',
            summary: page.summary || rawFrontmatter.summary || '',
            category: page.category || rawFrontmatter.category || 'page',
            slug: page.slug || rawFrontmatter.slug || 'page',
            source: 'vacms',
            vacmsPageId: page.id || data.job?.pageId || '',
            vacmsRevisionId: revision.id || data.job?.revisionId || '',
          }

          const bodySource = typeof revision.compiledMarkdown === 'string' && revision.compiledMarkdown.trim()
            ? { kind: 'compiledMarkdown', value: revision.compiledMarkdown }
            : { kind: 'sourceBody', value: String(revision.sourceBody || '') }

          const yamlValue = (value) => JSON.stringify(String(value ?? ''))
          const yaml = Object.entries(frontmatter)
            .map(([key, value]) => `${key}: ${yamlValue(value)}`)
            .join('\n')
          const content = `---\n${yaml}\n---\n\n${bodySource.value.replace(/^---[\s\S]*?---\s*/, '')}`
          fs.mkdirSync(require('node:path').dirname(generatedPath), { recursive: true })
          fs.writeFileSync(generatedPath, content, 'utf8')

          const contentHash = crypto.createHash('sha256').update(content).digest('hex')
          const receipt = {
            jobId: data.job?.id || process.env.JOB_ID,
            pageId: page.id || null,
            revisionId: revision.id || null,
            generatedPath,
            routePath: data.snapshot?.routePath || null,
            source: bodySource.kind,
            contentHash,
          }
          fs.writeFileSync('vacms-materialization-receipt.json', JSON.stringify(receipt, null, 2))
          fs.writeFileSync('vacms-generated-path.txt', generatedPath)
          NODE

      - name: Setup Node for live branch apply
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install public site dependencies for live branch apply
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: npm ci

      - name: Validate and build live branch apply content
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: npm run build

      - name: Configure Git author for live branch deploy
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy live public site branch
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: npm run deploy:pages -- --push

      - name: Finalize live public site deploy
        if: ${{ inputs.publish_mode == 'cms-live-branch-apply' }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const crypto = require('node:crypto')
          const childProcess = require('node:child_process')

          const exportPayload = JSON.parse(fs.readFileSync('export-payload.json', 'utf8'))
          const data = exportPayload.data || {}
          const generatedPath = String(data.snapshot?.generatedPath || fs.readFileSync('vacms-generated-path.txt', 'utf8')).trim()
          if (!generatedPath) throw new Error('generatedPath is missing for live deploy finalize')

          const content = fs.readFileSync(generatedPath)
          const contentHash = crypto.createHash('sha256').update(content).digest('hex')
          let deploySha = ''
          try {
            deploySha = childProcess.execFileSync('git', ['ls-remote', 'origin', 'refs/heads/gh-pages'], { encoding: 'utf8' }).trim().split(/\s+/)[0] || ''
          } catch {}

          const githubRunUrl = process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID
          const receipt = {
            ok: true,
            patchId: 'CMS-204T',
            status: 'PASS_CMS_204T_PUBLIC_SITE_PUBLISH_PIPELINE_REBIND_MATERIALIZE_CONTENT_TO_LIVE_DEPLOY_BRIDGE_SEAL',
            jobId: data.job?.id || process.env.JOB_ID,
            pageId: data.page?.id || null,
            revisionId: data.revision?.id || null,
            generatedPath,
            routePath: data.snapshot?.routePath || null,
            publishMode: 'cms-live-branch-apply',
            deployTarget: 'gh-pages',
            contentHash,
            deploySha: deploySha || null,
            githubRunUrl,
            generatedAt: new Date().toISOString()
          }
          fs.writeFileSync('vacms-live-deploy-receipt.json', JSON.stringify(receipt, null, 2))

          const finalize = {
            result: 'bridge_live_deployed',
            message: 'Public site content materialized, validated, and deployed to gh-pages.',
            githubRunUrl,
            commitSha: deploySha || null,
            snapshotWriterVersion: data.snapshot?.snapshotWriterVersion || 'cms-snapshot-writer-v1',
            generatedPath,
            generatedFiles: [{
              path: generatedPath,
              action: 'update',
              kind: 'page_markdown',
              reason: 'cms-live-branch-apply materialized content',
              previousHash: null,
              nextHash: contentHash
            }],
            publishMode: 'cms-live-branch-apply',
            deployTarget: 'gh-pages',
            contentHash,
            liveDeployReceipt: 'vacms-live-deploy-receipt.json'
          }
          fs.writeFileSync('vacms-live-finalize.json', JSON.stringify(finalize, null, 2))
          NODE
          curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID/finalize" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data @vacms-live-finalize.json \
            > finalize-result.json

      - name: Create branch and draft pull request
        if: ${{ inputs.publish_mode == 'cms-github-pages-pr-candidate' || inputs.publish_mode == 'cms-09-snapshot-apply' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          GENERATED_PATH="$(cat vacms-generated-path.txt)"
          BRANCH_NAME="vacms/publish/$JOB_ID"
          git config user.name "vacms-publish-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add "$GENERATED_PATH" vacms-materialization-receipt.json
          if git diff --cached --quiet; then
            echo "No public content changes detected."
            curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID/finalize" \
              -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"result\":\"bridge_verified\",\"message\":\"No public content changes detected.\",\"githubRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
              > finalize-result.json
            exit 0
          fi
          git commit -m "VACMS publish $JOB_ID"
          git push origin HEAD:"$BRANCH_NAME"
          cat > pr-body.md <<PRBODY
          ## VACMS Publish Candidate

          - Job ID: \`$JOB_ID\`
          - Generated path: \`$GENERATED_PATH\`
          - Branch: \`$BRANCH_NAME\`

          ## Policy

          - Direct main push: disabled
          - Automatic merge: disabled
          - Review required: yes
          PRBODY
          PR_URL="$(gh pr create --draft --base main --head "$BRANCH_NAME" --title "[VACMS] Publish $JOB_ID" --body-file pr-body.md)"
          echo "$PR_URL" > vacms-pr-url.txt
          curl -fsS -X POST "$ADMIN_API_BASE/content/publish-jobs/$JOB_ID/finalize" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"result\":\"bridge_verified\",\"message\":\"Draft PR created: $PR_URL\",\"githubRunUrl\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            > finalize-result.json

      - name: Upload VACMS publish receipts
        uses: actions/upload-artifact@v4
        if: ${{ always() && inputs.publish_mode != 'cms-dispatch-visibility-smoke' }}
        with:
          name: vacms-publish-${{ inputs.job_id }}
          path: |
            claim-result.json
            export-payload.json
            vacms-materialization-receipt.json
            vacms-pr-url.txt
            finalize-result.json
          if-no-files-found: ignore
