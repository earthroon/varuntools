name: Check varuntools GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "src/content/pages/**"
      - "src/content/generated/**"
      - "public/content/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "vite.config.*"
      - ".github/workflows/deploy-cloudflare-pages.yml"

  repository_dispatch:
    types:
      - public-site-publish

permissions:
  contents: read

concurrency:
  group: varuntools-github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-pages-live-check:
    name: GitHub Pages Live Check
    runs-on: ubuntu-latest

    env:
      PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
      VITE_PUBLIC_BUILD_SHA: ${{ github.sha }}
      VITE_PUBLIC_BUILD_REF: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build smoke
        run: npm run build

      - name: Check GitHub Pages URL
        if: ${{ env.PUBLIC_SITE_URL != '' }}
        shell: bash
        run: |
          curl -I --fail --max-time 20 "$PUBLIC_SITE_URL"

      - name: Record VACMS live check
        if: ${{ false }}
        env:
          ADMIN_BRIDGE_TOKEN: ${{ secrets.ADMIN_BRIDGE_TOKEN }}
          VACMS_ADMIN_API_URL: ${{ secrets.VACMS_ADMIN_API_URL }}
          VACMS_PUBLISH_JOB_ID: ${{ github.event.client_payload.jobId }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
        shell: bash
        run: |
          if [ -z "$ADMIN_BRIDGE_TOKEN" ]; then
            echo "ADMIN_BRIDGE_TOKEN secret is missing."
            exit 1
          fi

          if [ -z "$VACMS_ADMIN_API_URL" ]; then
            echo "VACMS_ADMIN_API_URL secret is missing."
            exit 1
          fi

          if [ -z "$VACMS_PUBLISH_JOB_ID" ]; then
            echo "VACMS_PUBLISH_JOB_ID payload is missing."
            exit 1
          fi

          BASE_URL="${VACMS_ADMIN_API_URL%/}"

          LIVE_CHECK_PAYLOAD="$(node - <<'NODE'
          const payload = { mode: 'run' };
          if (process.env.PUBLIC_SITE_URL) payload.siteBaseUrl = process.env.PUBLIC_SITE_URL;
          process.stdout.write(JSON.stringify(payload));
          NODE
          )"

          curl --fail-with-body \
            -X POST "$BASE_URL/api/content/publish-jobs/$VACMS_PUBLISH_JOB_ID/live-check" \
            -H "Authorization: Bearer $ADMIN_BRIDGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$LIVE_CHECK_PAYLOAD"
