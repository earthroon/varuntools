name: Publish Sheet CMS

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Legacy Sheet CMS workflow is disabled. Use VACMS/Admin CMS publish flow."
        required: false
        default: "disabled"

permissions:
  contents: read

jobs:
  legacy-sheet-cms-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy Sheet CMS workflow disabled
        run: |
          echo "Legacy Sheet CMS publish workflow is disabled."
          echo "VACMS/Admin CMS is the current authoring SSOT."
          echo "Use the Admin CMS publish bridge instead."
          exit 0
