name = "varuntools-inquiry-api"
main = "src/index.ts"
compatibility_date = "2026-05-07"

[vars]
INQUIRY_ALLOWED_ORIGINS = "https://varun.tools,http://localhost:5173,http://localhost:4173"
INQUIRY_STORAGE_MODE = "d1"

[[d1_databases]]
binding = "INQUIRY_DB"
database_name = "varun-tools-inquiries"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
