<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">VARUNTOOLS Showroom System cover</title>
  <desc id="desc">Abstract cards representing the VARUNTOOLS homepage, works, tools, lab, and product catalog system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf4e8"/>
      <stop offset="0.55" stop-color="#f2dfc6"/>
      <stop offset="1" stop-color="#d8ebff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#2c1d12" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="800" rx="54" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="156" y="152" width="888" height="496" rx="42" fill="#fffaf3" opacity="0.9"/>
    <rect x="206" y="212" width="304" height="164" rx="28" fill="#141414" opacity="0.9"/>
    <rect x="548" y="212" width="446" height="74" rx="22" fill="#ffffff" stroke="#2b2118" stroke-opacity="0.14"/>
    <rect x="548" y="314" width="220" height="188" rx="28" fill="#ffe6bd"/>
    <rect x="792" y="314" width="202" height="188" rx="28" fill="#dcecff"/>
    <rect x="206" y="418" width="304" height="84" rx="24" fill="#ffffff" stroke="#2b2118" stroke-opacity="0.14"/>
    <rect x="206" y="532" width="788" height="56" rx="18" fill="#2b2118" opacity="0.11"/>
  </g>
  <g fill="#2b2118">
    <text x="206" y="675" font-family="Arial, sans-serif" font-size="42" font-weight="800">VARUNTOOLS SHOWROOM</text>
    <text x="208" y="718" font-family="Arial, sans-serif" font-size="24" opacity="0.64">works · tools · lab · products</text>
  </g>
</svg>
